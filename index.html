/* ══════════════════════════════════════
   303 AUDIO ENGINE
══════════════════════════════════════ */
let audioCtx=null;
function getAC(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
function acid303(freq,dur,cutoff,res,envAmt,detune){
  try{
    const ac=getAC(),now=ac.currentTime;
    const osc=ac.createOscillator();
    const filt=ac.createBiquadFilter();
    const vca=ac.createGain();
    const dist=ac.createWaveShaper();
    const curve=new Float32Array(256);
    for(let i=0;i<256;i++){const x=i*2/256-1;curve[i]=x*(Math.abs(x)<0.8?1.2:0.55);}
    dist.curve=curve;
    osc.type='sawtooth';
    osc.frequency.setValueAtTime(freq,now);
    if(detune) osc.detune.setValueAtTime(detune,now);
    filt.type='lowpass';filt.Q.setValueAtTime(res||12,now);
    filt.frequency.setValueAtTime(cutoff||300,now);
    filt.frequency.linearRampToValueAtTime(cutoff*(1+(envAmt||3)),now+dur*0.12);
    filt.frequency.exponentialRampToValueAtTime(Math.max(cutoff*0.3,80),now+dur);
    vca.gain.setValueAtTime(0.001,now);
    vca.gain.linearRampToValueAtTime(0.26,now+0.012);
    vca.gain.exponentialRampToValueAtTime(0.001,now+dur);
    osc.connect(filt);filt.connect(dist);dist.connect(vca);vca.connect(ac.destination);
    osc.start(now);osc.stop(now+dur);
  }catch(e){}
}

   PIXEL HELPERS
══════════════════════════════════════ */
const _='.';
function spr(bmp,ox,oy,alpha){
  const prev=ctx.globalAlpha;
  if(alpha!==undefined) ctx.globalAlpha=alpha;
  for(let r=0;r<bmp.length;r++){
    const row=bmp[r];
    for(let c=0;c<row.length;c++){
      if(row[c]!==_){ctx.fillStyle=row[c];ctx.fillRect((ox+c)*P,(oy+r)*P,P,P);}
    }
  }
  ctx.globalAlpha=prev;
}
function px8border(x,y,w,h,col,thick){
  ctx.fillStyle=col;
  ctx.fillRect(x,y,w,thick);ctx.fillRect(x,y+h-thick,w,thick);
  ctx.fillRect(x,y,thick,h);ctx.fillRect(x+w-thick,y,thick,h);
}
function drawPxBtn(cx,cy,label,col){
  const U=8,BW=520,BH=96;
  const x=(cx-BW/2)|0,y=(cy-BH/2)|0;
  const BK='#111111';
  ctx.fillStyle=BK;
  ctx.fillRect(x+U*2,y,BW-U*4,U);
  ctx.fillRect(x+U*2,y+BH-U,BW-U*4,U);
  ctx.fillRect(x,y+U*2,U,BH-U*4);
  ctx.fillRect(x+BW-U,y+U*2,U,BH-U*4);
  ctx.fillRect(x+U,y+U,U,U);
  ctx.fillRect(x+BW-U*2,y+U,U,U);
  ctx.fillRect(x+U,y+BH-U*2,U,U);
  ctx.fillRect(x+BW-U*2,y+BH-U*2,U,U);

  ctx.fillStyle=col.cap;
  ctx.fillRect(x+U,y+U*2,U*2,BH-U*4);
  ctx.fillStyle=col.dark;
  ctx.fillRect(x+BW-U*3,y+U*2,U*2,BH-U*4);
  ctx.fillStyle=col.main;
  ctx.fillRect(x+U*3,y+U,BW-U*6,BH-U*2);
  ctx.fillStyle=col.light;
  ctx.fillRect(x+U*3,y+U,BW-U*6,U*2);
  ctx.fillStyle=col.dark;
  ctx.fillRect(x+U*3,y+BH-U*3,BW-U*6,U*2);

  ctx.fillStyle='#ffffff';
  ctx.font='bold 20px "LanaPixel"';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(label,cx,cy+3);
}

function recolor(bmp,b,s,o,e,ew){
  return bmp.map(row=>row.map(c=>{
    if(c===GW)return b;if(c===GS)return s;
    if(c===GO)return o;if(c===GE)return e;if(c===GL)return ew;return c;
  }));
}

}

  ['#f0c080','#e8a050','#e8a050','#e8a050','#e8a050','#e8a050','#e8a050','#f0c080',_],
  ['#f0c080','#e8a050','#e8a050','#e8a050','#e8a050','#e8a050','#e8a050','#f0c080',_],
  [_,'#f0c080','#f0c080','#f0c080','#f0c080','#f0c080','#f0c080',_,_],
];

let ghost,items=[],particles=[],bgClouds=[],bgStars=[];

let leftDown=false,rightDown=false;
let flashTxt=null,flashTimer=0;

function rnd(a,b){return Math.random()*(b-a)+a;}

function applyScore(delta,{sound}={}){
  const prev=score;
  score=Math.max(0,score+delta);
  if(score===prev) return;
  const s=sound||(delta>0?'gain':'lose');
  if(s==='high') playHigh();
  else if(s==='gain') playGain();
  else if(s==='lose') playLose();
}

/* ══════════════════════════════════════
   BACKGROUND
══════════════════════════════════════ */
function initBg(){
  bgStars=[];
  for(let i=0;i<60;i++) bgStars.push({
    x:Math.floor(rnd(0,W/P)),y:Math.floor(rnd(0,H/P)),
    big:Math.random()<0.12,tw:rnd(0,Math.PI*2),
    sp:rnd(0.015,0.055),ph:rnd(0,Math.PI*2)
  });
  bgClouds=[];
  [{x:3,y:14,sc:3},{x:80,y:4,sc:2.5},{x:20,y:150,sc:4},
   {x:90,y:170,sc:3.5},{x:8,y:240,sc:4.5},{x:100,y:260,sc:3}]
   .forEach(o=>bgClouds.push({...o}));
}

function drawBg(){
  /* colour lerp purple→#87cefa based on score 0→500 */
  const t=Math.min(1,score/500);
  const r2=Math.round(0x4a+(0x87-0x4a)*t);
  const g2=Math.round(0x3f+(0xce-0x3f)*t);
  const b2=Math.round(0x9f+(0xfa-0x9f)*t);
  ctx.fillStyle=`rgb(${r2},${g2},${b2})`;
  ctx.fillRect(0,0,W,H);

  /* purple gradient overlay fades with t */
  if(t<1){
    const grd=ctx.createLinearGradient(0,0,0,H);
    grd.addColorStop(0,`rgba(38,28,100,${0.55*(1-t)})`);
    grd.addColorStop(0.5,`rgba(55,40,120,${0.2*(1-t)})`);
    grd.addColorStop(1,`rgba(30,20,80,${0.45*(1-t)})`);
    ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
  }

  /* score>500: orange-pink overlay for 600pt end */
  if(score>500){
    const t2=Math.min(1,(score-500)/100);
    const og=ctx.createLinearGradient(0,0,W,H);
    og.addColorStop(0,`rgba(255,140,60,${t2*0.5})`);
    og.addColorStop(0.5,`rgba(255,100,160,${t2*0.4})`);
    og.addColorStop(1,`rgba(255,190,80,${t2*0.4})`);
    ctx.fillStyle=og;ctx.fillRect(0,0,W,H);
  }

  /* clouds */
  const cld=t>0.8?CLD_DAWN:CLD;
  bgClouds.forEach(c=>{
    c.x-=0.07;if(c.x<-c.sc*10)c.x=W/P+6;
    for(let row=0;row<cld.length;row++){
      const rr=cld[row];
      for(let col=0;col<rr.length;col++){
        if(rr[col]===_)continue;
        ctx.fillStyle=rr[col];
        ctx.fillRect(Math.round((c.x+col*c.sc)*P),Math.round((c.y+row*c.sc)*P),Math.ceil(c.sc*P),Math.ceil(c.sc*P));
      }
    }
  });

  /* stars fade as t rises */
  const starAlpha=1-t;
  if(starAlpha>0.04){
    bgStars.forEach(s=>{
      s.tw+=s.sp;
      const a=(0.5+0.5*Math.abs(Math.sin(s.tw+s.ph)))*starAlpha;
      ctx.globalAlpha=a;
      if(s.big){
        ctx.fillStyle='#f0eaff';
        ctx.fillRect(s.x*P,s.y*P-P,P,P*3);
        ctx.fillRect(s.x*P-P,s.y*P,P*3,P);
      } else {
        ctx.fillStyle='#e8e0ff';
        ctx.fillRect(s.x*P,s.y*P,P,P);
      }
      ctx.globalAlpha=1;
    });
  }

  /* pixel sun at 500+ */
  if(t>=0.9){
    const sx=W-80,sy=90;
    const alpha=Math.min(1,(t-0.9)*10);
    ctx.globalAlpha=alpha;
    ['#ffe060','#ffd030','#ffb810','#ff9000'].forEach((c,i)=>{
      const r3=(4-i)*7;ctx.fillStyle=c;
      ctx.fillRect(sx-r3,sy-r3,r3*2,r3*2);
    });
    ctx.globalAlpha=1;
  }
}

/* ══════════════════════════════════════
   DRAW GHOST(S)
══════════════════════════════════════ */
function drawOneGhost(cx,cy){
  const frozen=frozenTimer>0,weed=weedTimer>0;
  const sungOn=sungTimer>0&&!frozen&&!weed;
  const bob=Math.round((frozen||weed)?0:Math.sin(Date.now()/320)*1.5);
  const bmp=ghostBmp(frozen,weed,trioZombie);
  const alpha=frozen?0.25:1;
  const halfW=Math.floor(bmp[0].length/2);
  const halfH=Math.floor(bmp.length/2);
  const ox=Math.round(cx/P)-halfW;
  const oy=Math.round((cy+bob*P)/P)-halfH;
  spr(bmp,ox,oy,alpha);
  if(sungOn) spr(SUNG,ox,oy+3);
  if(poisonTimer>0){
    ctx.globalAlpha=0.22;ctx.fillStyle='#ff8800';
    ctx.fillRect(ox*P,oy*P,bmp[0].length*P,bmp.length*P);ctx.globalAlpha=1;
  }
}
function drawGhosts(){
  if(trioMode){
    drawOneGhost(ghost.x-60,ghost.y);
    drawOneGhost(ghost.x,ghost.y);
    drawOneGhost(ghost.x+60,ghost.y);
  } else {
    drawOneGhost(ghost.x,ghost.y);
  }
}

/* ══════════════════════════════════════
   DRAW ITEMS
══════════════════════════════════════ */
function drawItem(it){
  const d=IDEF[it.type];
  const ox=Math.round(it.x/P)-Math.floor(d.sw/2);
  const oy=Math.round(it.y/P)-Math.floor(d.sh/2);
  spr(ISPRITES[it.type],ox,oy);
}

/* ══════════════════════════════════════
   PARTICLES
══════════════════════════════════════ */
function spawnParticles(x,y,color,n){
  for(let i=0;i<n;i++) particles.push({x,y,vx:rnd(-3,3),vy:rnd(-4,-0.5),alpha:1,color,life:rnd(30,55)});
}
function drawParticles(){
  particles.forEach(p2=>{
    ctx.save();ctx.globalAlpha=p2.alpha;ctx.fillStyle=p2.color;
    ctx.fillRect(Math.round(p2.x/P)*P,Math.round(p2.y/P)*P,P,P);ctx.restore();
  });
}

function drawFlash(){
  if(!flashTxt||flashTimer<=0)return;
  ctx.save();ctx.globalAlpha=Math.min(1,flashTimer/50);
  ctx.font='bold 22px "LanaPixel"';ctx.textAlign='center';
  ctx.fillStyle=flashTxt.color;ctx.fillText(flashTxt.text,W/2,H*0.34);
  ctx.restore();flashTimer--;
}
function setFlash(txt,color){flashTxt={text:txt,color};flashTimer=70;}

function drawBlack(){

  ctx.fillStyle=blink?'#ffffff':'#999999';

  ctx.fillText('TOO HIGH',W/2,H/2-20);

}

/* ══════════════════════════════════════
   LSD DISTORT
══════════════════════════════════════ */
function applyLSD(){
  const t=Date.now()/380;
  const id=ctx.getImageData(0,0,W,H);
  const src=new Uint8ClampedArray(id.data);const d=id.data;
  for(let y2=0;y2<H;y2++){
    const wx=Math.sin(y2*0.055+t)*20|0;
    const wy=Math.sin(y2*0.038+t*1.2)*7|0;
    for(let x2=0;x2<W;x2++){
      const sx=((x2+wx)%W+W)%W;
      const sy=Math.min(H-1,Math.max(0,y2+wy));
      const di=(y2*W+x2)*4,si=(sy*W+sx)*4;
      d[di]=src[si];d[di+1]=src[si+1];d[di+2]=src[si+2];d[di+3]=src[si+3];
    }
  }
  ctx.putImageData(id,0,0);
}

/* ══════════════════════════════════════
   600 SKULL SCREEN
══════════════════════════════════════ */
function drawSkullScreen(){
  /* orange-pink dream gradient */
  const grd=ctx.createLinearGradient(0,0,W,H);
  grd.addColorStop(0,'#ff7030');grd.addColorStop(0.5,'#ff50a0');grd.addColorStop(1,'#ffcc50');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);

  /* decorative border */
  px8border(20,20,W-40,H-40,'#ffffff',5);
  px8border(32,32,W-64,H-64,'rgba(255,255,255,0.4)',3);

  /* big skull center — scale 8 */
  const sk=8;
  const skOx=(W/2-SKULL_SPR[0].length*sk/2)|0;
  const skOy=(H/2-SKULL_SPR.length*sk/2-60)|0;
  for(let r=0;r<SKULL_SPR.length;r++){
    const row=SKULL_SPR[r];
    for(let c=0;c<row.length;c++){
      if(row[c]===_)continue;
      ctx.fillStyle=row[c];
      ctx.fillRect(skOx+c*sk,skOy+r*sk,sk,sk);
    }
  }

  /* flashing text */
  const blink=Math.floor(Date.now()/350)%2;
  ctx.fillStyle=blink?'#ffffff':'#ffe0c0';
  ctx.font='bold 30px "LanaPixel"';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('YOU PLAY TOO DAMN MUCH',W/2,H/2+120);

  /* pixel sparkles corner */
  [[60,60],[W-60,60],[60,H-60],[W-60,H-60]].forEach(([sx,sy])=>{
    const pulse2=Math.floor(Date.now()/200)%2;
    ctx.fillStyle=pulse2?'#ffffff':'#ffee80';
    ctx.fillRect(sx-8,sy,5,20);ctx.fillRect(sx,sy-8,20,5);
    ctx.fillRect(sx+12,sy,5,20);ctx.fillRect(sx,sy+12,20,5);
  });
}

/* ══════════════════════════════════════
   CLICK HANDLER for WANT MORE
══════════════════════════════════════ */
function handleClick(cx,cy){
  if(!wantMoreShown)return;
  const bw=520,bh=96,bx=W/2-bw/2;
  const b1cy=H/2-32,b2cy=H/2+110;
  const b1y=b1cy-bh/2,b2y=b2cy-bh/2;
  if(cx>bx&&cx<bx+bw){
    if(cy>b1y&&cy<b1y+bh){
      /* Give me that shit → zombie trio */
      wantMoreShown=false;gameOn=true;
      trioMode=true;trioZombie=true;
      playUnlock();
      setFlash('ZOMBIE MODE!','#88ff88');
    } else if(cy>b2y&&cy<b2y+bh){
      /* Tomorrow → back to start */
      wantMoreShown=false;gameOn=false;
      document.getElementById('overlay').classList.remove('hidden');
    }
  }
}

/* ══════════════════════════════════════
   HIT DETECTION
══════════════════════════════════════ */
function hitGhost(it){
  const d=IDEF[it.type];
  const bonusW=trioMode?60:0;
  const extraPct=trioMode?0.07:0;
  return Math.abs(ghost.x-it.x)<(ghost.hw+d.hw+bonusW)*(0.7+extraPct) &&
         Math.abs(ghost.y-it.y)<(ghost.hh+d.hh)*(0.7+extraPct);
}

/* ══════════════════════════════════════
   SPAWN
══════════════════════════════════════ */
function spawnItem(){
  const total=IWTS.reduce((a,b)=>a+b,0);
  let r=Math.random()*total,type='needle';
  for(let i=0;i<ITYPES.length;i++){r-=IWTS[i];if(r<=0){type=ITYPES[i];break;}}
  const d=IDEF[type];
  items.push({x:rnd(60,W-60),y:-80,type,...d,vy:baseSpeed*0.055});
}

/* ══════════════════════════════════════
   RESET
══════════════════════════════════════ */
function resetGame(){
  ghost={x:W/2,y:H-200,hw:30,hh:28,vx:0};
  items=[];particles=[];score=0;frame=0;baseSpeed=20;
  frozenTimer=0;sungTimer=0;blackTimer=0;weedTimer=0;
  lsdActive=false;poisonTimer=0;comboScore=0;
  trioMode=false;trioZombie=false;
  wantMoreShown=false;skullShown=false;
  IWTS=[20,18,12,12,10,10,18];
  startTime=Date.now();gameTime=0;
  initBg();gameOn=true;
  document.getElementById('overlay').classList.add('hidden');
}

/* ══════════════════════════════════════
   MAIN LOOP
══════════════════════════════════════ */
function gameLoop(){
  if(gameOn){
    frame++;
    gameTime=(Date.now()-startTime)/1000;
    baseSpeed=20+Math.floor(frame/600)*1.2;

    /* timers */
    if(frozenTimer>0)frozenTimer--;
    if(weedTimer>0)weedTimer--;
    if(sungTimer>0)sungTimer--;
    if(blackTimer>0){blackTimer--;if(blackTimer<=0)setFlash('','#000');}
    if(poisonTimer>0)poisonTimer--;

    /* movement */
    const frozen=frozenTimer>0;
    if(!frozen){
      const accel=weedTimer>0?0.35:1.4;
      const maxV=weedTimer>0?2:8;
      if(leftDown) ghost.vx=Math.max(ghost.vx-accel,-maxV);
      if(rightDown)ghost.vx=Math.min(ghost.vx+accel,maxV);
      if(!leftDown&&!rightDown)ghost.vx*=0.78;
      ghost.x+=ghost.vx;
      ghost.x=Math.max(ghost.hw,Math.min(W-ghost.hw,ghost.x));
    }

    /* spawn */
    if(frame%Math.max(26,56-Math.floor(frame/300))===0)spawnItem();

    /* item movement */
    const effSpeed=weedTimer>0?baseSpeed*0.3:baseSpeed;
    items.forEach(it=>{
      it.y+=it.vy*(effSpeed/baseSpeed);
      it.vy=Math.min(it.vy+0.005,baseSpeed*0.12);
    });

    /* collisions */
    for(let i=items.length-1;i>=0;i--){
      const it=items[i];
      if(it.y>H+100){items.splice(i,1);continue;}
      if(hitGhost(it)){
        const t=it.type;
        if(t==='needle'){
          applyScore(-50);
          frozenTimer=60;comboScore=0;
          setFlash('-50  NEEDLE!','#88ccff');
          spawnParticles(it.x,it.y,'#aaddff',10);
        } else if(t==='mdma'){
          if(poisonTimer<=0){
            const pts=15;
            const nextCombo=comboScore+pts;
            if(nextCombo>=100){
              applyScore(pts,{sound:'high'});
              blackTimer=180;comboScore=0;
            } else {
              applyScore(pts);
              comboScore=nextCombo;
              setFlash('+15  MDMA','#f8d030');
            }
          }
          sungTimer=18;spawnParticles(it.x,it.y,'#f8d030',14);
        } else if(t==='shroom'){
          if(poisonTimer<=0){
            const pts=25;
            const nextCombo=comboScore+pts;
            if(nextCombo>=100){
              applyScore(pts,{sound:'high'});
              blackTimer=180;comboScore=0;
            } else {
              applyScore(pts);
              comboScore=nextCombo;
              setFlash('+25  SHROOM','#f06020');
            }
          }
          sungTimer=18;spawnParticles(it.x,it.y,'#f06020',14);
        } else if(t==='lsd'){
          lsdActive=true;
          sungTimer=18;
          setFlash('LSD...','#cc88ff');spawnParticles(it.x,it.y,'#cc88ff',12);
        } else if(t==='e'){
          lsdActive=false;
          sungTimer=18;
          setFlash('E  OK!','#4488ff');spawnParticles(it.x,it.y,'#4488ff',12);
          acid303(440,0.2,800,8,3);
        } else if(t==='weed'){
          weedTimer=300;
          sungTimer=18;
          setFlash('WEED...SLOW','#40b830');spawnParticles(it.x,it.y,'#40b830',12);
        } else if(t==='alcohol'){
          poisonTimer=300;
          setFlash('DRUNK! 5s','#e08020');spawnParticles(it.x,it.y,'#f8a030',12);playLose();
        }
        items.splice(i,1);
      }
    }

    /* particles */
    for(let i=particles.length-1;i>=0;i--){
      const p2=particles[i];
      p2.x+=p2.vx;p2.y+=p2.vy;p2.vy+=0.14;p2.alpha-=1/p2.life;p2.life--;
      if(p2.life<=0)particles.splice(i,1);
    }

    /* trio unlock at 300 */
    if(!trioMode&&score>=300){
      trioMode=true;
      IWTS[6]=Math.round(IWTS[6]*1.07);
      IWTS[5]=Math.round(IWTS[5]*1.07);
      setFlash('👻👻👻  TRIO!','#ffeeaa');
      playUnlock();
    }

    /* 500 → want more screen */
    if(score>=500&&!wantMoreShown&&!skullShown&&!trioZombie){
      wantMoreShown=true;gameOn=false;playEnding();
    }

    /* 600 → skull end */
    if(score>=600&&!skullShown){
      skullShown=true;wantMoreShown=false;gameOn=false;playSkull();
    }

    if(score>hiScore){hiScore=score;document.getElementById('hi').textContent=hiScore;}
    document.getElementById('sc').textContent=score;
  }

  /* ── RENDER ── */

  /* black screen TOO HIGH (must not override WANT MORE / skull) */
  if(blackTimer>0&&!wantMoreShown&&!skullShown){
    drawBlack();
    requestAnimationFrame(gameLoop);
    return;
  }

  /* special screens */
  if(skullShown){drawSkullScreen();requestAnimationFrame(gameLoop);return;}
  if(wantMoreShown){drawWantMore();requestAnimationFrame(gameLoop);return;}

  drawBg();
  items.forEach(drawItem);
  if(ghost) drawGhosts();
  if(gameOn){drawParticles();drawFlash();}
  if(lsdActive)applyLSD();
  if(poisonTimer>0&&gameOn){
    ctx.globalAlpha=0.1;ctx.fillStyle='#ff8800';
    ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;
  }

  requestAnimationFrame(gameLoop);
}

document.getElementById('startBtn').addEventListener('click',resetGame);

canvas.addEventListener('pointerdown',e=>{
  const rect=canvas.getBoundingClientRect();
  const scaleX=W/rect.width,scaleY=H/rect.height;
  handleClick((e.clientX-rect.left)*scaleX,(e.clientY-rect.top)*scaleY);
});

const bL=document.getElementById('btnL'),bR=document.getElementById('btnR');
bL.addEventListener('pointerdown',e=>{e.preventDefault();leftDown=true;});
bL.addEventListener('pointerup',()=>leftDown=false);
bL.addEventListener('pointerleave',()=>leftDown=false);
bR.addEventListener('pointerdown',e=>{e.preventDefault();rightDown=true;});
bR.addEventListener('pointerup',()=>rightDown=false);
bR.addEventListener('pointerleave',()=>rightDown=false);
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='a')leftDown=true;
  if(e.key==='ArrowRight'||e.key==='d')rightDown=true;
});
document.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft'||e.key==='a')leftDown=false;
  if(e.key==='ArrowRight'||e.key==='d')rightDown=false;
});
/* unlock AudioContext on first interaction */
document.getElementById('frame').addEventListener('pointerdown',()=>{
  try{getAC().resume();}catch(e){}
},{once:true});

initBg();
if(document.fonts&&document.fonts.ready){
  document.fonts.ready.then(()=>requestAnimationFrame(gameLoop));
}else{
  requestAnimationFrame(gameLoop);
}
</script>
</body>
</html>
