let audioCtx=null;
function getAC(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended')audioCtx.resume();
  return audioCtx;
}
function acid303(freq,dur,cutoff,res,envAmt,detune){
  try{
    const ac=getAC(),now=ac.currentTime;
    const osc=ac.createOscillator(),filt=ac.createBiquadFilter();
    const vca=ac.createGain(),dist=ac.createWaveShaper();
    const curve=new Float32Array(256);
    for(let i=0;i<256;i++){const x=i*2/256-1;curve[i]=x*(Math.abs(x)<0.8?1.2:0.55);}
    dist.curve=curve;
    osc.type='sawtooth';
    osc.frequency.setValueAtTime(freq,now);
    if(detune)osc.detune.setValueAtTime(detune,now);
    filt.type='lowpass';filt.Q.setValueAtTime(res||12,now);
    filt.frequency.setValueAtTime(cutoff||300,now);
    filt.frequency.linearRampToValueAtTime(cutoff*(1+(envAmt||3)),now+dur*0.12);
    filt.frequency.exponentialRampToValueAtTime(Math.max(cutoff*0.3,80),now+dur);
    vca.gain.setValueAtTime(0.001,now);
    vca.gain.linearRampToValueAtTime(0.26,now+0.012);
    vca.gain.exponentialRampToValueAtTime(0.001,now+dur);
    osc.connect(filt);filt.connect(dist);dist.connect(vca);vca.connect(ac.destination);
    osc.start(now);osc.stop(now+dur);
  }catch(e){}
}

const _='.';
function spr(bmp,ox,oy,alpha){
  const prev=ctx.globalAlpha;
  if(alpha!==undefined)ctx.globalAlpha=alpha;
  for(let r=0;r<bmp.length;r++){const row=bmp[r];for(let c=0;c<row.length;c++){if(row[c]!==_){ctx.fillStyle=row[c];ctx.fillRect((ox+c)*P,(oy+r)*P,P,P);}}}
  ctx.globalAlpha=prev;
}
function px8b(x,y,w,h,col,thick){
  ctx.fillStyle=col;
  ctx.fillRect(x,y,w,thick);ctx.fillRect(x,y+h-thick,w,thick);
  ctx.fillRect(x,y,thick,h);ctx.fillRect(x+w-thick,y,thick,h);
}

function rnd(a,b){return Math.random()*(b-a)+a;}

/* ══════════════ BACKGROUND ══════════════ */
function initBg(){
  bgStars=[];
  for(let i=0;i<60;i++)bgStars.push({x:Math.floor(rnd(0,W/P)),y:Math.floor(rnd(0,H/P)),big:Math.random()<0.12,tw:rnd(0,Math.PI*2),sp:rnd(0.015,0.055),ph:rnd(0,Math.PI*2)});
  bgClouds=[];

}

function drawBg(){
  /* Phase 1: purple → #87cefa over 0-500 pts */
  const t1=Math.min(1,score/500);
  let r2=Math.round(0x4a+(0x87-0x4a)*t1);
  let g2=Math.round(0x3f+(0xce-0x3f)*t1);
  let b2=Math.round(0x9f+(0xfa-0x9f)*t1);

  /* Phase 2: #87cefa → orange-pink over 500-600 pts (zombie phase uses zombieScore 0→100) */
  if(trioZombie){
    const t2=Math.min(1,zombieScore/100);
    /* #87cefa → #ff8040 for r, #ce→#50 g, #fa→#80 b, then blend pink */
    r2=Math.round(0x87+(0xff-0x87)*t2);
    g2=Math.round(0xce+(0x60-0xce)*t2);
    b2=Math.round(0xfa+(0x80-0xfa)*t2);
  }

  ctx.fillStyle=`rgb(${r2},${g2},${b2})`;
  ctx.fillRect(0,0,W,H);

  /* purple overlay fades out */
  if(t1<1&&!trioZombie){
    const grd=ctx.createLinearGradient(0,0,0,H);
    grd.addColorStop(0,`rgba(38,28,100,${0.55*(1-t1)})`);
    grd.addColorStop(0.5,`rgba(55,40,120,${0.2*(1-t1)})`);
    grd.addColorStop(1,`rgba(30,20,80,${0.45*(1-t1)})`);
    ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
  }

  /* pink overlay during zombie phase */
  if(trioZombie){
    const t2=Math.min(1,zombieScore/100);
    const og=ctx.createLinearGradient(0,0,W,H);
    og.addColorStop(0,`rgba(255,80,140,${t2*0.35})`);
    og.addColorStop(0.5,`rgba(255,160,80,${t2*0.28})`);
    og.addColorStop(1,`rgba(255,100,180,${t2*0.3})`);
    ctx.fillStyle=og;ctx.fillRect(0,0,W,H);
  }

  /* clouds */
  const cld=trioZombie?CLD_DAWN:(t1>0.8?CLD_DAWN:CLD);
  bgClouds.forEach(c=>{
    c.x-=0.07;if(c.x<-c.sc*10)c.x=W/P+6;
    for(let row=0;row<cld.length;row++){const rr=cld[row];for(let col=0;col<rr.length;col++){if(rr[col]===_)continue;ctx.fillStyle=rr[col];ctx.fillRect(Math.round((c.x+col*c.sc)*P),Math.round((c.y+row*c.sc)*P),Math.ceil(c.sc*P),Math.ceil(c.sc*P));}}
  });

  /* stars: visible only before 500 */
  const starAlpha=1-t1;
  if(starAlpha>0.04&&!trioZombie){
    bgStars.forEach(s=>{
      s.tw+=s.sp;
      const a=(0.5+0.5*Math.abs(Math.sin(s.tw+s.ph)))*starAlpha;
      ctx.globalAlpha=a;
      if(s.big){ctx.fillStyle='#f0eaff';ctx.fillRect(s.x*P,s.y*P-P,P,P*3);ctx.fillRect(s.x*P-P,s.y*P,P*3,P);}
      else{ctx.fillStyle='#e8e0ff';ctx.fillRect(s.x*P,s.y*P,P,P);}
      ctx.globalAlpha=1;
    });
  }
}

function drawOneGhost(cx,cy){
  const frozen=frozenTimer>0,weed=weedTimer>0;
  const sungOn=sungTimer>0&&!frozen&&!weed;
  const bob=Math.round((frozen||weed)?0:Math.sin(Date.now()/320)*1.5);
  const bmp=ghostBmp(frozen,weed,trioZombie);
  const alpha=frozen?0.25:1;
  const ox=Math.round(cx/P)-6;
  const oy=Math.round((cy+bob*P)/P)-7;
  spr(bmp,ox,oy,alpha);
  if(sungOn)spr(SUNG,ox,oy+3);
  if(poisonTimer>0){ctx.globalAlpha=0.22;ctx.fillStyle='#ff8800';ctx.fillRect(ox*P,oy*P,12*P,11*P);ctx.globalAlpha=1;}
}
function drawGhosts(){
  if(trioMode){
    drawOneGhost(ghost.x-60,ghost.y);
    drawOneGhost(ghost.x,ghost.y);
    drawOneGhost(ghost.x+60,ghost.y);
  } else {
    drawOneGhost(ghost.x,ghost.y);
  }
}

/* ══════════════ ITEMS ══════════════ */
function drawItem(it){
  const d=IDEF[it.type];
  spr(ISPRITES[it.type],Math.round(it.x/P)-Math.floor(d.sw/2),Math.round(it.y/P)-Math.floor(d.sh/2));
}

/* ══════════════ PARTICLES ══════════════ */
function spawnParticles(x,y,color,n){for(let i=0;i<n;i++)particles.push({x,y,vx:rnd(-3,3),vy:rnd(-4,-0.5),alpha:1,color,life:rnd(30,55)});}
function drawParticles(){particles.forEach(p2=>{ctx.save();ctx.globalAlpha=p2.alpha;ctx.fillStyle=p2.color;ctx.fillRect(Math.round(p2.x/P)*P,Math.round(p2.y/P)*P,P,P);ctx.restore();});}

/* ══════════════ FLASH ══════════════ */
function drawFlash(){if(!flashTxt||flashTimer<=0)return;ctx.save();ctx.globalAlpha=Math.min(1,flashTimer/50);ctx.font='bold 22px "Courier New"';ctx.textAlign='center';ctx.fillStyle=flashTxt.color;ctx.fillText(flashTxt.text,W/2,H*0.34);ctx.restore();flashTimer--;}
function setFlash(txt,color){flashTxt={text:txt,color};flashTimer=70;}

/* ══════════════ BLACK / TOO HIGH ══════════════ */
function drawBlack(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  const blink=Math.floor(Date.now()/400)%2;
  ctx.fillStyle=blink?'#ffffff':'#999999';
  ctx.font='bold 56px "Courier New"';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('TOO HIGH',W/2,H/2-24);
  ctx.font='bold 28px "Courier New"';
  ctx.fillText('* * * * * * * *',W/2,H/2+40);
}

/* ══════════════ LSD ══════════════ */
function applyLSD(){
  const t=Date.now()/380;
  const id=ctx.getImageData(0,0,W,H);const src=new Uint8ClampedArray(id.data);const d=id.data;
  for(let y2=0;y2<H;y2++){const wx=Math.sin(y2*0.055+t)*20|0;const wy=Math.sin(y2*0.038+t*1.2)*7|0;for(let x2=0;x2<W;x2++){const sx=((x2+wx)%W+W)%W;const sy=Math.min(H-1,Math.max(0,y2+wy));const di=(y2*W+x2)*4,si=(sy*W+sx)*4;d[di]=src[si];d[di+1]=src[si+1];d[di+2]=src[si+2];d[di+3]=src[si+3];}}
  ctx.putImageData(id,0,0);
}

/* ══════════════════════════════════════
   500 WANT MORE PILLS SCREEN
   Button regions match BTN1/BTN2 exactly
══════════════════════════════════════ */
function drawWantMore(){
  ctx.fillStyle='#87cefa';ctx.fillRect(0,0,W,H);

  /* pulsing highlight */
  const pulse=0.15+0.07*Math.sin(Date.now()/280);
  ctx.globalAlpha=pulse;ctx.fillStyle='#ffe080';ctx.fillRect(W/2-320,H/2-280,640,560);ctx.globalAlpha=1;

  /* 8bit frame */
  px8b(20,20,W-40,H-40,'#ffd700',6);
  px8b(34,34,W-68,H-68,'rgba(255,215,0,0.3)',3);

  /* flashing title */
  const blink=Math.floor(Date.now()/420)%2;
  ctx.fillStyle=blink?'#ffd700':'#ffaa00';
  ctx.font='bold 52px "Courier New"';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('WANT MORE PILLS?',W/2,H/2-200);

  /* dashes */
  for(let x2=W/2-280;x2<W/2+280;x2+=14){ctx.fillStyle=blink?'#ffd700':'#b08000';ctx.fillRect(x2,H/2-140,9,5);}

  /* pill deco */
  spr(MDMA_SPR,Math.round(110/P),Math.round((H/2-220)/P));
  spr(SHROOM_SPR,Math.round(560/P),Math.round((H/2-220)/P));

  /* ── Button 1: Give me that shit ── */
  ctx.fillStyle='#0d2208';
  ctx.fillRect(BTN1.x,BTN1.y,BTN1.w,BTN1.h);
  px8b(BTN1.x,BTN1.y,BTN1.w,BTN1.h,'#44ff44',5);
  ctx.fillStyle='#aaffaa';ctx.font='bold 26px "Courier New"';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('[ GIVE ME THAT SHIT ]',W/2,BTN1.y+BTN1.h/2);

  /* ── Button 2: Let's do it tomorrow ── */
  ctx.fillStyle='#220808';
  ctx.fillRect(BTN2.x,BTN2.y,BTN2.w,BTN2.h);
  px8b(BTN2.x,BTN2.y,BTN2.w,BTN2.h,'#ff4444',5);
  ctx.fillStyle='#ffaaaa';ctx.font='bold 26px "Courier New"';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText("[ LET'S DO IT TOMORROW ]",W/2,BTN2.y+BTN2.h/2);
}

/* ══════════════ 600 SKULL SCREEN ══════════════ */
function drawSkullScreen(){
  const grd=ctx.createLinearGradient(0,0,W,H);
  grd.addColorStop(0,'#ff6820');grd.addColorStop(0.5,'#ff40a0');grd.addColorStop(1,'#ffbb40');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
  px8b(20,20,W-40,H-40,'#ffffff',6);
  px8b(34,34,W-68,H-68,'rgba(255,255,255,0.35)',3);

  /* big skull scale=9 */
  const sk=9;
  const skOx=(W/2-SKULL_SPR[0].length*sk/2)|0;
  const skOy=(H/2-SKULL_SPR.length*sk/2-80)|0;
  for(let r=0;r<SKULL_SPR.length;r++){const row=SKULL_SPR[r];for(let c=0;c<row.length;c++){if(row[c]===_)continue;ctx.fillStyle=row[c];ctx.fillRect(skOx+c*sk,skOy+r*sk,sk,sk);}}

  const blink=Math.floor(Date.now()/350)%2;
  ctx.fillStyle=blink?'#ffffff':'#ffe0c0';
  ctx.font='bold 36px "Courier New"';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('YOU PLAY TOO DAMN MUCH',W/2,H/2+140);

  [[60,60],[W-60,60],[60,H-60],[W-60,H-60]].forEach(([sx,sy])=>{
    const p2=Math.floor(Date.now()/200)%2;
    ctx.fillStyle=p2?'#ffffff':'#ffee80';
    ctx.fillRect(sx-8,sy,6,22);ctx.fillRect(sx,sy-8,22,6);
    ctx.fillRect(sx+14,sy,6,22);ctx.fillRect(sx,sy+14,22,6);
  });
}

/* ══════════════════════════════════════
   CLICK HANDLER
   cx/cy are already in canvas coordinates (0-720 / 0-1080)
══════════════════════════════════════ */
function handleCanvasClick(cx,cy){
  if(!wantMoreShown)return;
  /* Button 1 */
  if(cx>=BTN1.x&&cx<=BTN1.x+BTN1.w&&cy>=BTN1.y&&cy<=BTN1.y+BTN1.h){
    wantMoreShown=false;
    trioMode=true;trioZombie=true;
    zombieScore=0;gameOn=true;
    playUnlock();
    setFlash('ZOMBIE MODE!','#aaffaa');
    return;
  }
  /* Button 2 */
  if(cx>=BTN2.x&&cx<=BTN2.x+BTN2.w&&cy>=BTN2.y&&cy<=BTN2.y+BTN2.h){
    wantMoreShown=false;gameOn=false;
    document.getElementById('overlay').classList.remove('hidden');
  }
}

/* ══════════════ HIT DETECTION ══════════════ */
function hitGhost(it){
  const d=IDEF[it.type];
  const bonusW=trioMode?60:0;
  const ep=trioMode?0.07:0;
  return Math.abs(ghost.x-it.x)<(ghost.hw+d.hw+bonusW)*(0.7+ep)&&Math.abs(ghost.y-it.y)<(ghost.hh+d.hh)*(0.7+ep);
}

/* ══════════════ SPAWN ══════════════ */
function spawnItem(){
  const total=IWTS.reduce((a,b)=>a+b,0);let r=Math.random()*total,type='needle';
  for(let i=0;i<ITYPES.length;i++){r-=IWTS[i];if(r<=0){type=ITYPES[i];break;}}
  const d=IDEF[type];
  items.push({x:rnd(60,W-60),y:-80,type,...d,vy:baseSpeed*0.055});
}

/* ══════════════ RESET ══════════════ */
function resetGame(){
  ghost={x:W/2,y:H-200,hw:30,hh:28,vx:0};
  items=[];particles=[];score=0;frame=0;baseSpeed=20;zombieScore=0;
  frozenTimer=0;sungTimer=0;blackTimer=0;weedTimer=0;
  lsdActive=false;poisonTimer=0;comboScore=0;
  trioMode=false;trioZombie=false;
  wantMoreShown=false;skullShown=false;
  IWTS=[20,18,12,12,10,10,18];
  startTime=Date.now();
  initBg();gameOn=true;
  document.getElementById('overlay').classList.add('hidden');
}

/* ══════════════ MAIN LOOP ══════════════ */
function gameLoop(){
  if(gameOn){
    frame++;
    baseSpeed=20+Math.floor(frame/600)*1.2;

    if(frozenTimer>0)frozenTimer--;
    if(weedTimer>0)weedTimer--;
    if(sungTimer>0)sungTimer--;
    if(blackTimer>0){blackTimer--;if(blackTimer<=0)setFlash('','#000');}
    if(poisonTimer>0)poisonTimer--;

    const frozen=frozenTimer>0;
    if(!frozen){
      const accel=weedTimer>0?0.35:1.4,maxV=weedTimer>0?2:8;
      if(leftDown)ghost.vx=Math.max(ghost.vx-accel,-maxV);
      if(rightDown)ghost.vx=Math.min(ghost.vx+accel,maxV);
      if(!leftDown&&!rightDown)ghost.vx*=0.78;
      ghost.x+=ghost.vx;
      ghost.x=Math.max(ghost.hw,Math.min(W-ghost.hw,ghost.x));
    }

    if(frame%Math.max(26,56-Math.floor(frame/300))===0)spawnItem();
    const effSpeed=weedTimer>0?baseSpeed*0.3:baseSpeed;
    items.forEach(it=>{it.y+=it.vy*(effSpeed/baseSpeed);it.vy=Math.min(it.vy+0.005,baseSpeed*0.12);});

    for(let i=items.length-1;i>=0;i--){
      const it=items[i];
      if(it.y>H+100){items.splice(i,1);continue;}
      if(hitGhost(it)){
        const t=it.type;
        if(t==='needle'){
          score=Math.max(0,score-50);frozenTimer=60;comboScore=0;
          setFlash('-50  NEEDLE!','#88ccff');spawnParticles(it.x,it.y,'#aaddff',10);playLose();
        } else if(t==='mdma'){
          if(poisonTimer<=0){
            const pts=15;score+=pts;comboScore+=pts;
            if(trioZombie)zombieScore+=pts;
            if(comboScore>=100){blackTimer=180;comboScore=0;playHigh();}
            else{setFlash('+15  MDMA','#f8d030');playGain();}
          }
          sungTimer=18;spawnParticles(it.x,it.y,'#f8d030',14);
        } else if(t==='shroom'){
          if(poisonTimer<=0){
            const pts=25;score+=pts;comboScore+=pts;
            if(trioZombie)zombieScore+=pts;
            if(comboScore>=100){blackTimer=180;comboScore=0;playHigh();}
            else{setFlash('+25  SHROOM','#f06020');playGain();}
          }
          sungTimer=18;spawnParticles(it.x,it.y,'#f06020',14);
        } else if(t==='lsd'){
          lsdActive=true;setFlash('LSD...','#cc88ff');spawnParticles(it.x,it.y,'#cc88ff',12);
        } else if(t==='e'){
          lsdActive=false;setFlash('E  OK!','#4488ff');spawnParticles(it.x,it.y,'#4488ff',12);acid303(440,0.2,800,8,3);
        } else if(t==='weed'){
          weedTimer=300;setFlash('WEED...SLOW','#40b830');spawnParticles(it.x,it.y,'#40b830',12);
        } else if(t==='alcohol'){
          poisonTimer=300;setFlash('DRUNK! 5s','#e08020');spawnParticles(it.x,it.y,'#f8a030',12);playLose();
        }
        items.splice(i,1);
      }
    }

    for(let i=particles.length-1;i>=0;i--){const p2=particles[i];p2.x+=p2.vx;p2.y+=p2.vy;p2.vy+=0.14;p2.alpha-=1/p2.life;p2.life--;if(p2.life<=0)particles.splice(i,1);}

    /* trio unlock at 300 */
    if(!trioMode&&!trioZombie&&score>=300){
      trioMode=true;
      IWTS[6]=Math.round(IWTS[6]*1.07);IWTS[5]=Math.round(IWTS[5]*1.07);
      setFlash('👻👻👻  TRIO!','#ffeeaa');playUnlock();
    }

    /* 500 → want more (only before zombie phase) */
    if(!trioZombie&&score>=500&&!wantMoreShown&&!skullShown){
      wantMoreShown=true;gameOn=false;playEnding();
    }

    /* 600 → skull (zombie phase: zombieScore>=100, or direct score>=600) */
    if(!skullShown&&(score>=600||(trioZombie&&zombieScore>=100))){
      skullShown=true;wantMoreShown=false;gameOn=false;playSkull();
    }

    if(score>hiScore){hiScore=score;document.getElementById('hi').textContent=hiScore;}
    document.getElementById('sc').textContent=score;
  }

  /* ── RENDER ── */
  if(blackTimer>0){drawBlack();requestAnimationFrame(gameLoop);return;}
  if(skullShown){drawSkullScreen();requestAnimationFrame(gameLoop);return;}
  if(wantMoreShown){drawWantMore();requestAnimationFrame(gameLoop);return;}

  drawBg();
  items.forEach(drawItem);
  if(gameOn){drawGhosts();drawParticles();drawFlash();}
  if(lsdActive)applyLSD();
  if(poisonTimer>0&&gameOn){ctx.globalAlpha=0.1;ctx.fillStyle='#ff8800';ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;}

  requestAnimationFrame(gameLoop);
}

/* ══════════════ CONTROLS ══════════════ */
document.getElementById('startBtn').addEventListener('click',resetGame);

/* Canvas click → convert to canvas coordinates via scaling */
canvas.addEventListener('pointerdown',e=>{
  if(!wantMoreShown)return;
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  /* rect gives CSS size; canvas is always W×H */
  const cx=(e.clientX-rect.left)*(W/rect.width);
  const cy=(e.clientY-rect.top)*(H/rect.height);
  handleCanvasClick(cx,cy);
});

const bL=document.getElementById('btnL'),bR=document.getElementById('btnR');
bL.addEventListener('pointerdown',e=>{e.preventDefault();leftDown=true;});
bL.addEventListener('pointerup',()=>leftDown=false);bL.addEventListener('pointerleave',()=>leftDown=false);
bR.addEventListener('pointerdown',e=>{e.preventDefault();rightDown=true;});
bR.addEventListener('pointerup',()=>rightDown=false);bR.addEventListener('pointerleave',()=>rightDown=false);
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='a')leftDown=true;if(e.key==='ArrowRight'||e.key==='d')rightDown=true;});
document.addEventListener('keyup',e=>{if(e.key==='ArrowLeft'||e.key==='a')leftDown=false;if(e.key==='ArrowRight'||e.key==='d')rightDown=false;});
document.getElementById('frame').addEventListener('pointerdown',()=>{try{getAC().resume();}catch(e){}},{once:true});

initBg();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
